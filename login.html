<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #1d2b64;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0f1a4d;
}

.error {
  color: red;
  display: none;
  text-align: center;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Iniciar Sesión</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <p class="error" id="error">Credenciales incorrectas</p>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value.trim();

  if (!username || !password) {
    document.getElementById("error").textContent = "Completa todos los campos";
    document.getElementById("error").style.display = "block";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      sessionStorage.setItem("token", data.token);
      sessionStorage.setItem("role", data.role);
      sessionStorage.setItem("username", data.username);

      if (data.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "cliente.html";
      }
    } else {
      document.getElementById("error").textContent = data.error || "Credenciales incorrectas";
      document.getElementById("error").style.display = "block";
    }
  } catch (e) {
    document.getElementById("error").textContent = "Error conectando al servidor";
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
