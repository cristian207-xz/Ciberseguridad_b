<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #1d2b64;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0f1a4d;
}

.error {
  color: red;
  display: none;
  text-align: center;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Iniciar Sesión</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <p class="error" id="error">Credenciales incorrectas</p>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    window.location.href="admin.html";
  } else if(u==="cliente" && p==="1234"){
    window.location.href="cliente.html";
  } else {
    document.getElementById("error").style.display="block";
  }
}
</script>

</body>
</html>
