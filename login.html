<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroSeguro – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 340px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h2 { text-align: center; margin-bottom: 8px; color: #1d2b64; }
    .subtitle { text-align: center; font-size: 12px; color: #888; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    input:disabled { background: #f0f0f0; cursor: not-allowed; }
    button {
      width: 100%;
      padding: 12px;
      background: #1d2b64;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 8px;
    }
    button:hover:not(:disabled) { background: #0f1a4d; }
    button:disabled { background: #999; cursor: not-allowed; }
    .error {
      color: #c0392b;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .lockout {
      color: #e67e22;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .intentos {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <h2>✈️ AeroSeguro</h2>
  <p class="subtitle">Sistema de autenticación seguro</p>
  <input id="user" placeholder="Usuario" autocomplete="off">
  <input id="pass" type="password" placeholder="Contraseña">
  <button id="btnLogin" onclick="handleLogin()">Entrar</button>
  <p class="error" id="error">❌ Credenciales incorrectas</p>
  <p class="lockout" id="lockout">🔒 Demasiados intentos. Espera <span id="countdown">30</span>s</p>
  <p class="intentos" id="intentos"></p>
</div>

<script>
  let bloqueado = false;

  async function handleLogin() {
    if (bloqueado) return;

    const username = document.getElementById('user').value.trim();
    const password = document.getElementById('pass').value.trim();

    if (!username || !password) {
      mostrarError('Completa todos los campos');
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.status === 429) {
        activarBloqueo(data.error);
        return;
      }

      if (res.ok) {
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('role', data.role);
        sessionStorage.setItem('username', data.username);
        window.location.href = data.role === 'admin' ? 'admin.html' : 'cliente.html';
      } else {
        mostrarError(data.error || 'Credenciales incorrectas');
      }

    } catch (e) {
      mostrarError('Error conectando al servidor');
    }
  }

  function mostrarError(msg) {
    const el = document.getElementById('error');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function activarBloqueo(msg) {
    bloqueado = true;
    let segundos = 30;
    document.getElementById('error').style.display = 'none';
    document.getElementById('lockout').style.display = 'block';
    document.getElementById('btnLogin').disabled = true;
    document.getElementById('user').disabled = true;
    document.getElementById('pass').disabled = true;

    const timer = setInterval(() => {
      segundos--;
      document.getElementById('countdown').textContent = segundos;
      if (segundos <= 0) {
        clearInterval(timer);
        bloqueado = false;
        document.getElementById('lockout').style.display = 'none';
        document.getElementById('btnLogin').disabled = false;
        document.getElementById('user').disabled = false;
        document.getElementById('pass').disabled = false;
        document.getElementById('pass').value = '';
      }
    }, 1000);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
