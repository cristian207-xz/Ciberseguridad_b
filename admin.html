<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin panel</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1f2937;
  color: white;
}

.nav {
  background: #111827;
  padding: 15px;
  text-align: right;
}

button {
  padding: 10px 15px;
  border: none;
  background: #ef4444;
  color: white;
  cursor: pointer;
}

.container {
  padding: 40px;
}

.card {
  background: #374151;
  padding: 20px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>
<body>

<div class="nav">
  <button onclick="logout()">Cerrar sesión</button>
</div>

<div class="container">
  <h1>👨‍💼 Panel de Administrador</h1>

  <div class="card">📊 Gestión de usuarios</div>
  <div class="card">✈️ Gestión de vuelos</div>
  <div class="card">💰 Reportes financieros</div>
</div>

<script>
  // Guard de sesión con JWT
async function checkAuth(requiredRole) {
  const token = sessionStorage.getItem("token");
  if (!token) { window.location.href = "login.html"; return; }

  const res = await fetch("/api/verify", {
    headers: { "Authorization": "Bearer " + token }
  });

  if (!res.ok) { 
    sessionStorage.clear();
    window.location.href = "login.html"; 
    return; 
  }

  const data = await res.json();
  if (data.user.role !== requiredRole) {
    window.location.href = "login.html";
  }
}

checkAuth("admin"); // En admin.html
// checkAuth("cliente"); // En cliente.html
function logout(){
  window.location.href="index.html";
}
</script>

</body>
</html>
