<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TravelGo - Explora el mundo</title>

  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.6);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  text-align: center;
}

h1 {

}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 5px;
  background: #ff7a18;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #e66a00;
}
</style>
</head>
<body>

<div class="overlay">
  <div class="box">
    <h1>🌍 TravelGo</h1>
    <p>Descubre destinos increíbles alrededor del mundo</p>

</html>
